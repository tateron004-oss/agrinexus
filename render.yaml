services:
  - type: web
    name: agrinexus-provider-engines
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm run provider-engines
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PROVIDER_ENGINE_HOST
        value: 0.0.0.0
      - key: PROVIDER_ENGINE_PORT
        value: 10000
      - key: PROVIDER_ENGINE_BASE_URL
        value: https://agrinexus-provider-engines.onrender.com
