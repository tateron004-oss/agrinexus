services:
  - type: web
    name: agrinexus-provider-engines
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm run provider-engines
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PROVIDER_ENGINE_HOST
        value: 0.0.0.0
      - key: PROVIDER_ENGINE_PORT
        value: 10000
      - key: AI_PROVIDER_API_KEY
        sync: false
      - key: LEARNING_PROVIDER_API_KEY
        sync: false
      - key: WORKFORCE_PROVIDER_API_KEY
        sync: false
      - key: HEALTH_PROVIDER_API_KEY
        sync: false
      - key: TRADE_PROVIDER_API_KEY
        sync: false
      - key: DRONE_PROVIDER_API_KEY
        sync: false
      - key: VOICE_PROVIDER_API_KEY
        sync: false
      - key: TRANSLATION_PROVIDER_API_KEY
        sync: false
      - key: AUTH_PROVIDER_API_KEY
        sync: false
      - key: COMMUNICATION_PROVIDER_API_KEY
        sync: false
      - key: BILLING_PROVIDER_API_KEY
        sync: false

  - type: web
    name: agrinexus-platform
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    disk:
      name: agrinexus-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: AGRINEXUS_DATA_DIR
        value: /var/data
      - key: AGRINEXUS_STATE_STORE
        value: postgres
      - key: AGRINEXUS_REQUIRE_LIVE_SERVICES
        value: true
      - key: AGRINEXUS_AUTOMATION_SCHEDULES
        value: disabled
      - key: AGRINEXUS_EVENT_TRIGGERS
        value: disabled
      - key: AUTH_PROVIDER
        value: webhook
      - key: PASSWORD_RESET_PROVIDER
        value: webhook
      - key: AUTH_WEBHOOK_URL
        sync: false
      - key: PASSWORD_RESET_WEBHOOK_URL
        sync: false
      - key: AUTH_PROVIDER_API_KEY
        sync: false
      - key: EMAIL_PROVIDER
        sync: false
      - key: EMAIL_WEBHOOK_URL
        sync: false
      - key: SMS_PROVIDER
        sync: false
      - key: SMS_WEBHOOK_URL
        sync: false
      - key: WHATSAPP_PROVIDER
        sync: false
      - key: WHATSAPP_WEBHOOK_URL
        sync: false
      - key: COMMUNICATION_PROVIDER_API_KEY
        sync: false
