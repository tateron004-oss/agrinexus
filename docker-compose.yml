services:
  postgres:
    image: postgres:16
    container_name: agrinexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agrinexus
      POSTGRES_USER: agrinexus
      POSTGRES_PASSWORD: agrinexus_dev_password
    ports:
      - "5432:5432"
    volumes:
      - agrinexus_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agrinexus -d agrinexus"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  agrinexus_postgres_data:
