name: Apply Agriculture and Live Knowledge activation repair
on:
  push:
    paths:
      - ".github/workflows/apply-agriculture-activation-route.yml"
      - "scripts/apply-agriculture-activation-route.js"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  apply-activation-route-repair:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Apply and verify both activation route repairs
        run: node scripts/apply-agriculture-activation-route.js
      - name: Publish verified intact runtime
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/app.js
          git diff --cached --quiet && { echo "No runtime repair was produced."; exit 1; }
          git commit -m "Fix Agriculture and Live Knowledge voice activation"
          git push origin HEAD:main
