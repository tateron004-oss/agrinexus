name: Publish tested Realtime workspace repair
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/publish-realtime-workspace-repair.yml"
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Apply the tested release patch
        run: |
          printf '%s' '' | base64 --decode > /tmp/nexus-repair.patch
          git apply --check /tmp/nexus-repair.patch
          git apply /tmp/nexus-repair.patch
      - name: Verify protected release gates
        run: |
          npm ci
          node --check server.js
          node --check public/app.js
          node --check scripts/nexus-genesis-live-provider-browser-smoke.js
          npm run qa:nexus-genesis-voice-workspace-bridge
          npm run qa:nexus-genesis-persistent-voice-lifecycle
          npm run qa:nexus-realtime-microphone-visibility
          node scripts/nexus-service-worker-cache-safety-qa.js
          git diff --check
      - name: Publish and remove this temporary workflow
        run: |
          rm .github/workflows/publish-realtime-workspace-repair.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Connect Realtime tools to visible workspaces"
          git push origin HEAD:main
