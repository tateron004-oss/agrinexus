name: Restore Approved Nexus Workspace Runtime

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/restore-approved-nexus-runtime.yml

permissions:
  contents: write

jobs:
  restore-approved-runtime:
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 10
    defaults:
      run:
        shell: cmd
    steps:
      - name: Check out current main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply and verify exact approved activation repair
        run: |
          node scripts/apply-approved-genesis-activation-repair.js && git diff --check && node scripts/nexus-genesis-voice-workspace-bridge-qa.js && git diff -- public/app.js scripts/nexus-genesis-voice-workspace-bridge-qa.js

      - name: Publish exact approved activation repair
        run: |
          git config user.name "github-actions[bot]" && git config user.email "41898282+github-actions[bot]@users.noreply.github.com" && git add public/app.js scripts/nexus-genesis-voice-workspace-bridge-qa.js && git commit -m "Apply approved Genesis workspace activation repair" && git push origin HEAD:main
