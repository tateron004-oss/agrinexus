name: Restore Approved Nexus Workspace Runtime

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/restore-approved-nexus-runtime.yml
      - scripts/apply-approved-mission-renderer-repair.js

permissions:
  contents: write

jobs:
  restore-approved-runtime:
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 10
    defaults:
      run:
        shell: cmd
    steps:
      - name: Check out current main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply and verify approved mission renderer repair
        run: |
          node scripts/apply-approved-mission-renderer-repair.js && node --check public/app.js && git diff --check && node scripts/nexus-genesis-mission-renderer-workspace-qa.js && node scripts/nexus-genesis-voice-workspace-bridge-qa.js && node scripts/nexus-browser-action-controller-qa.js && node scripts/nexus-genesis-browser-voice-acceptance-qa.js && node scripts/nexus-genesis-persistent-voice-lifecycle-qa.js && node scripts/nexus-realtime-microphone-visibility-qa.js

      - name: Publish approved mission renderer repair
        run: |
          git config user.name "github-actions[bot]" && git config user.email "41898282+github-actions[bot]@users.noreply.github.com" && git add public/app.js && git commit -m "Mount voice function window in mission renderer" && git push origin HEAD:main
