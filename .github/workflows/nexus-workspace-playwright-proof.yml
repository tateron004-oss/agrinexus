name: Nexus Workspace Playwright Proof

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/nexus-workspace-playwright-proof.yml
      - tests/playwright/nexus-workspace-action.spec.js
      - playwright.workflow.config.js
      - scripts/run-nexus-workspace-proof.js
  workflow_dispatch:
    inputs:
      base_url:
        description: Deployed Nexus URL to verify
        required: true
        default: https://agrinexus-platform.onrender.com

permissions:
  contents: read

jobs:
  deployed-workspace-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXUS_PLAYWRIGHT_BASE_URL: ${{ inputs.base_url || 'https://agrinexus-platform.onrender.com' }}
      NEXUS_PLAYWRIGHT_EMAIL: ${{ secrets.NEXUS_PLAYWRIGHT_EMAIL }}
      NEXUS_PLAYWRIGHT_PASSWORD: ${{ secrets.NEXUS_PLAYWRIGHT_PASSWORD }}
      NEXUS_PLAYWRIGHT_HEADED: "false"
    steps:
      - name: Check out exact repository state
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: npm

      - name: Install application dependencies
        run: npm ci

      - name: Install Playwright without changing the application lockfile
        run: npm install --no-save --no-package-lock @playwright/test@1.61.1

      - name: Install Chromium and system dependencies
        run: npx playwright install --with-deps chromium

      - name: Run deployed full activation-matrix proof
        run: node scripts/run-nexus-workspace-proof.js

      - name: Preserve proof, traces, screenshots, and errors
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nexus-workspace-playwright-proof-${{ github.run_id }}
          path: test-results/nexus-workspace-action/
          if-no-files-found: warn
          retention-days: 30
