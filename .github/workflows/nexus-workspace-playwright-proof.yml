name: Nexus Workspace Playwright Proof

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/nexus-workspace-playwright-proof.yml
      - tests/playwright/nexus-workspace-action.spec.js
      - playwright.workflow.config.js
  workflow_dispatch:
    inputs:
      base_url:
        description: Deployed Nexus URL to verify
        required: true
        default: https://agrinexus-platform.onrender.com

permissions:
  contents: read

jobs:
  deployed-workspace-proof:
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 20
    defaults:
      run:
        shell: cmd
    env:
      NEXUS_PLAYWRIGHT_BASE_URL: ${{ inputs.base_url || 'https://agrinexus-platform.onrender.com' }}
      NEXUS_PLAYWRIGHT_EMAIL: ${{ secrets.NEXUS_PLAYWRIGHT_EMAIL }}
      NEXUS_PLAYWRIGHT_PASSWORD: ${{ secrets.NEXUS_PLAYWRIGHT_PASSWORD }}
      NEXUS_PLAYWRIGHT_HEADED: "true"
    steps:
      - name: Check out exact repository state
        uses: actions/checkout@v4

      - name: Install Node with native Windows commands
        run: |
          set "NODE_VERSION=22.23.1"
          set "NODE_ARCHIVE=%RUNNER_TEMP%\node-v22.23.1-win-x64.zip"
          set "NODE_ROOT=%RUNNER_TEMP%\nexus-node"
          set "NODE_BIN=%RUNNER_TEMP%\nexus-node\node-v22.23.1-win-x64"
          if exist "%RUNNER_TEMP%\nexus-node" rmdir /s /q "%RUNNER_TEMP%\nexus-node"
          mkdir "%RUNNER_TEMP%\nexus-node"
          curl.exe -fsSL "https://nodejs.org/dist/v22.23.1/node-v22.23.1-win-x64.zip" -o "%RUNNER_TEMP%\node-v22.23.1-win-x64.zip"
          tar.exe -xf "%RUNNER_TEMP%\node-v22.23.1-win-x64.zip" -C "%RUNNER_TEMP%\nexus-node"
          echo %RUNNER_TEMP%\nexus-node\node-v22.23.1-win-x64>>"%GITHUB_PATH%"
          "%RUNNER_TEMP%\nexus-node\node-v22.23.1-win-x64\node.exe" --version
          "%RUNNER_TEMP%\nexus-node\node-v22.23.1-win-x64\npm.cmd" --version

      - name: Install application dependencies
        run: npm ci

      - name: Install Playwright without changing the application lockfile
        run: npm install --no-save --no-package-lock @playwright/test@1.61.1

      - name: Install Chromium
        run: npx playwright install chromium

      - name: Run deployed four-workspace proof
        run: npx playwright test --config=playwright.workflow.config.js

      - name: Preserve proof, traces, screenshots, and errors
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nexus-workspace-playwright-proof-${{ github.run_id }}
          path: test-results/nexus-workspace-action/
          if-no-files-found: warn
          retention-days: 30

# Post-deployment proof trigger for runtime commit 1d4f8848.
