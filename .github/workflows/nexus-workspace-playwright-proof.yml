name: Nexus Workspace Playwright Proof

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/nexus-workspace-playwright-proof.yml
      - tests/playwright/nexus-workspace-action.spec.js
  workflow_dispatch:
    inputs:
      base_url:
        description: Deployed Nexus URL to verify
        required: true
        default: https://agrinexus-platform.onrender.com

permissions:
  contents: read

jobs:
  deployed-workspace-proof:
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 20
    env:
      NEXUS_PLAYWRIGHT_BASE_URL: ${{ inputs.base_url }}
      NEXUS_PLAYWRIGHT_EMAIL: ${{ secrets.NEXUS_PLAYWRIGHT_EMAIL }}
      NEXUS_PLAYWRIGHT_PASSWORD: ${{ secrets.NEXUS_PLAYWRIGHT_PASSWORD }}
    steps:
      - name: Check out exact repository state
        uses: actions/checkout@v4

      - name: Install Node with native Windows extraction
        shell: powershell
        run: |
          $nodeVersion = "22.23.1"
          $nodeArchive = Join-Path $env:RUNNER_TEMP "node-v$nodeVersion-win-x64.zip"
          $nodeRoot = Join-Path $env:RUNNER_TEMP "nexus-node"
          $nodeBin = Join-Path $nodeRoot "node-v$nodeVersion-win-x64"
          Invoke-WebRequest -Uri "https://nodejs.org/dist/v$nodeVersion/node-v$nodeVersion-win-x64.zip" -OutFile $nodeArchive
          if (Test-Path $nodeRoot) {
            Remove-Item -Recurse -Force $nodeRoot
          }
          Expand-Archive -Path $nodeArchive -DestinationPath $nodeRoot -Force
          $nodeBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & (Join-Path $nodeBin "node.exe") --version
          & (Join-Path $nodeBin "npm.cmd") --version

      - name: Install application dependencies
        run: npm ci

      - name: Install Playwright without changing the application lockfile
        run: npm install --no-save --no-package-lock @playwright/test@1.61.1

      - name: Install Chromium
        run: npx playwright install chromium

      - name: Run deployed four-workspace proof
        run: npx playwright test --config=playwright.workflow.config.js

      - name: Preserve proof, traces, screenshots, and errors
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nexus-workspace-playwright-proof-${{ github.run_id }}
          path: test-results/nexus-workspace-action/
          if-no-files-found: warn
          retention-days: 30
