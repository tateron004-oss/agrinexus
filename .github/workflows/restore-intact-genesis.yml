name: Restore intact Genesis release sources
on:
  push:
    paths:
      - .github/workflows/restore-intact-genesis.yml
  workflow_dispatch:
permissions:
  contents: write
jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Restore and validate tested release
        shell: bash
        run: |
          set -euo pipefail
          git checkout 65595d8f2c9d7bf7a1bb13fb8364b62cc8f45940 -- server.js public/app.js
          printf '%s' '' | base64 --decode > /tmp/restore.patch
          git apply --check /tmp/restore.patch
          git apply /tmp/restore.patch
          node --check server.js
          node --check public/app.js
          npm run qa:nexus-genesis-voice-workspace-bridge
          npm run qa:nexus-genesis-persistent-voice-lifecycle
          npm run qa:nexus-service-worker-cache-safety
          rm -f .github/workflows/restore-intact-genesis.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server.js public/app.js .github/workflows/restore-intact-genesis.yml
          git commit -m "Restore intact Genesis release sources"
          git push origin HEAD:main
